<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ushizaru | Top</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-image: url('img/top.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .top-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 1.5rem;
        }
        .top-link {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.3s, transform 0.3s;
            text-shadow: 
                2px 2px 0 #000,
                -2px 2px 0 #000,
                2px -2px 0 #000,
                -2px -2px 0 #000,
                4px 4px 8px rgba(0,0,0,0.6);
        }
        .top-link:hover {
            color: #ffcc00;
            transform: scale(1.05);
        }
        
        /* スマホ向けの調整 */
        @media (max-width: 768px) {
            .top-link {
                font-size: 1.8rem;
                gap: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="top-container">
        <a href="profile.html" class="top-link">PROFILE</a>
        <a href="works.html" class="top-link">PORTFOLIO</a>
        <a href="band.html" class="top-link">AI BAND 球体関節人類</a>
        <a href="contact.html" class="top-link">CONTACT</a>
    </div>
</body>
</html>

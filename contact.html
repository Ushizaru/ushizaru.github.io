<head>
    <meta charset="UTF-8">

<body>
    <header>
        <div class="logo">
            <a href="index.html">Ushizaru</a>
        </div>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Profile</a></li>
                <li><a href="works.html">Portfolio</a></li>
                <li><a href="band.html">AI BAND 球体関節人類</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="section-title">Contact</h1>
        
        <div class="contact-container">
            <p style="text-align: center; margin-bottom: 2rem;">ご依頼やお問い合わせ、感想などは以下のフォームまたはSNSからお気軽にどうぞ。</p>

            <!-- 各種SNSリンク -->
            <div class="sns-links">
                <!-- 実際のSNSリンク（URL）に書き換えてね -->
                <a href="#" target="_blank">X (Twitter)</a>
                <a href="#" target="_blank">YouTube</a>
                <a href="#" target="_blank">Instagram</a>
                <a href="#" target="_blank">note</a>
            </div>

            <!-- メールフォーム（現在は見た目のみ） -->
            <!-- 最後に「Formspree」などのURLを action="ここ" に設定すると本当に送れるようになります -->
            <form id="contactForm" action="#" method="POST">
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" required placeholder="山田 太郎">
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">お問い合わせ内容</label>
                    <textarea id="message" name="message" required placeholder="こちらにメッセージをご記入ください。"></textarea>
                </div>
                <button type="submit" class="submit-btn">送信する</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Ushizaru. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
